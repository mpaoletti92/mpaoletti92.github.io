<!doctype html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mercedes E. Paoletti — Hyperspectral deep learning & HPC</title>
<meta name="description" content="Sitio científico de Mercedes E. Paoletti. Investigación en imagen hiperespectral, deep learning y computación de altas prestaciones para observación de la Tierra."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#faf9f5; --bg-elev:#ffffff; --ink:#121214; --ink-2:#2b2b2f;
  --ink-3:#5e5e65; --ink-4:#8f8f97; --line:#eae7dc; --line-2:#d9d5c7;
  --accent:#2547ff; --accent-2:#ff5a2e; --accent-3:#00b389; --accent-4:#ffb020;
  --chip:#f2efe4; --chip-ink:#1a1a1d; --sel:#fff3a8;
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  --sans:"Space Grotesk",system-ui,-apple-system,sans-serif;
  --serif:"Instrument Serif","Times New Roman",serif;
  --ease:cubic-bezier(.2,.7,.2,1);
  --radius:14px;
}
[data-theme="dark"]{
  --bg:#0c0d10; --bg-elev:#15161b; --ink:#f5f4ef; --ink-2:#d9d8d1;
  --ink-3:#9a9aa2; --ink-4:#686870; --line:#24252c; --line-2:#2f3038;
  --chip:#1b1c22; --chip-ink:#e9e8e2; --sel:#2547ff;
  --accent:#7791ff; --accent-2:#ff7a5c; --accent-3:#4cd4ae; --accent-4:#ffc24d;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:var(--sans); font-size:16px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
  transition:background .3s var(--ease), color .3s var(--ease);
}
::selection{background:var(--sel); color:var(--ink)}
a{color:inherit}

/* ============ FRAME ============ */
.page{max-width:1240px; margin:0 auto; padding:20px 40px 96px}
@media (max-width:760px){.page{padding:16px 18px 72px}}

/* ============ TOPBAR ============ */
.topbar{
  position:sticky; top:0; z-index:10;
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 0 18px;
  background:color-mix(in oklab, var(--bg) 88%, transparent);
  backdrop-filter:saturate(160%) blur(10px);
  -webkit-backdrop-filter:saturate(160%) blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex; align-items:center; gap:12px}
.brand .mark{
  width:30px; height:30px; border-radius:50%;
  background:conic-gradient(from 210deg,#2547ff,#00b389,#ffb020,#ff5a2e,#2547ff);
  filter:saturate(1.1);
  box-shadow:inset 0 0 0 1.5px var(--bg);
}
.brand .who{font-family:var(--serif); font-size:19px; letter-spacing:.1px; line-height:1}
.brand .who em{color:var(--ink-3); font-style:italic}
.nav{display:flex; gap:22px}
.nav a{
  color:var(--ink-3); text-decoration:none; font:500 12.5px var(--sans);
  padding:4px 0; border-bottom:1.5px solid transparent; transition:all .2s;
}
.nav a:hover{color:var(--ink); border-color:var(--ink)}
@media (max-width:860px){.nav{display:none}}
.utils{display:flex; gap:6px; align-items:center}
.ubtn{
  appearance:none; background:transparent; border:1px solid var(--line);
  color:var(--ink-2); font:500 11px var(--mono); letter-spacing:.05em;
  padding:6px 10px; border-radius:999px; cursor:pointer;
  display:inline-flex; align-items:center; gap:5px; transition:all .15s;
  text-transform:uppercase;
}
.ubtn:hover{border-color:var(--ink-2); color:var(--ink)}
.ubtn[aria-pressed="true"]{background:var(--ink); color:var(--bg); border-color:var(--ink)}

/* ============ HERO ============ */
.hero{
  display:grid; grid-template-columns:1.35fr .9fr; gap:56px;
  padding:56px 0 72px; border-bottom:1px solid var(--line);
}
@media (max-width:900px){.hero{grid-template-columns:1fr; gap:36px; padding:36px 0 44px}}
h1.headline{
  font-family:var(--serif); font-weight:400;
  font-size:clamp(46px,7vw,88px); line-height:.98; letter-spacing:-.015em;
  margin:0 0 26px; text-wrap:balance;
}
h1.headline em{font-style:italic; color:var(--ink-3)}
h1.headline .dot{
  display:inline-block; width:.32em; height:.32em; border-radius:50%;
  background:var(--accent-2); transform:translateY(-.58em); margin-left:.05em;
}
.lede{
  font-size:18px; line-height:1.55; color:var(--ink-2);
  max-width:58ch; margin:0 0 30px; text-wrap:pretty;
}
.lede b{color:var(--ink); font-weight:600}
.kv{display:grid; grid-template-columns:auto 1fr; gap:7px 20px; font:12.5px var(--mono)}
.kv dt{color:var(--ink-4); text-transform:uppercase; letter-spacing:.08em}
.kv dd{margin:0; color:var(--ink-2)}
.kv dd a{color:var(--ink-2); text-decoration:underline; text-decoration-color:var(--line-2); text-underline-offset:3px}
.kv dd a:hover{color:var(--accent); text-decoration-color:var(--accent)}

.portrait{
  position:relative; aspect-ratio:4/5;
  border-radius:var(--radius); overflow:hidden;
  background:
    radial-gradient(circle at 75% 20%, #e9d7ff 0%, transparent 55%),
    radial-gradient(circle at 20% 80%, #ffd3a5 0%, transparent 50%),
    linear-gradient(135deg,#eaf2ff 0%,#fff6dd 100%);
  box-shadow:0 1px 0 var(--line), 0 30px 60px -30px rgba(40,40,60,.25);
}
[data-theme="dark"] .portrait{background:
    radial-gradient(circle at 75% 20%, #4a3570 0%, transparent 55%),
    radial-gradient(circle at 20% 80%, #7a4a28 0%, transparent 50%),
    linear-gradient(135deg,#1a2540 0%,#2a2515 100%);}
.portrait .tag{
  position:absolute; top:14px; left:14px;
  background:var(--bg-elev); color:var(--ink);
  font:10.5px var(--mono); letter-spacing:.08em; text-transform:uppercase;
  padding:5px 9px; border-radius:999px; border:1px solid var(--line);
}
.portrait .stat{
  position:absolute; top:14px; right:14px;
  background:var(--ink); color:var(--bg);
  font:10.5px var(--mono); letter-spacing:.04em; text-transform:uppercase;
  padding:5px 9px; border-radius:999px;
}
.portrait .silhouette{position:absolute; inset:0; display:flex; align-items:flex-end; justify-content:center}
.portrait .silhouette svg{width:72%; height:auto; display:block}
.portrait .initials{
  position:absolute; inset:auto 0 0 0; padding:18px 20px;
  display:flex; align-items:flex-end; justify-content:space-between;
  color:var(--ink); font:10.5px var(--mono); letter-spacing:.08em;
  text-transform:uppercase;
}

/* ============ SECTIONS ============ */
section.block{padding:72px 0; border-bottom:1px solid var(--line)}
@media (max-width:760px){section.block{padding:48px 0}}
.sec-head, .sec-body{display:grid; grid-template-columns:180px 1fr; gap:40px}
.sec-head{margin-bottom:30px; align-items:baseline}
@media (max-width:760px){.sec-head,.sec-body{grid-template-columns:1fr; gap:14px}}
.sec-head .num{font:12px var(--mono); color:var(--ink-4); letter-spacing:.08em; text-transform:uppercase}
.sec-head h2{
  font-family:var(--serif); font-weight:400;
  font-size:clamp(30px,4.2vw,46px); line-height:1.05; margin:0;
  letter-spacing:-.01em; text-wrap:balance;
}
.sec-head h2 em{font-style:italic; color:var(--ink-3)}
.sec-body .side{color:var(--ink-3); font-size:13px; line-height:1.5}
.sec-body .side .label{font:11px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px}
.sec-body .side p{margin:0 0 8px}

/* ============ BIO ============ */
.bio p{font-size:17px; line-height:1.6; color:var(--ink-2); margin:0 0 16px; max-width:66ch; text-wrap:pretty}
.bio p.big{font-size:23px; line-height:1.35; color:var(--ink); font-family:var(--serif); font-weight:400; margin-bottom:26px}
.bio p.big em{color:var(--ink-3); font-style:italic}
.bio p b{color:var(--ink); font-weight:600}

.stats-row{display:grid; grid-template-columns:repeat(4,1fr); margin-top:36px; border-top:1px solid var(--line)}
.stat-cell{padding:20px 0 0; border-right:1px solid var(--line)}
.stat-cell:last-child{border-right:none}
.stat-cell .num{font-family:var(--serif); font-size:48px; line-height:1; letter-spacing:-.02em}
.stat-cell .num sup{font:14px var(--mono); color:var(--ink-4); vertical-align:super; margin-left:2px}
.stat-cell .lbl{font:11px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.08em; margin-top:8px}
@media (max-width:700px){.stats-row{grid-template-columns:repeat(2,1fr)} .stat-cell:nth-child(2){border-right:none} .stat-cell{padding-bottom:16px; border-bottom:1px solid var(--line)}}

/* ============ CHART ============ */
.chart{margin-top:22px}
.chart .legend{display:flex; gap:18px; font:11px var(--mono); color:var(--ink-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px}
.chart .legend span{display:inline-flex; align-items:center; gap:6px}
.chart .legend i{width:10px; height:10px; border-radius:2px; display:inline-block}
.chart svg{width:100%; height:auto; display:block}

/* ============ PUBS ============ */
.pub-toolbar{display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center; margin-bottom:22px}
.pub-search{
  flex:1; min-width:220px; background:var(--bg-elev);
  border:1px solid var(--line); border-radius:999px;
  padding:9px 16px; font:14px var(--sans); color:var(--ink);
  transition:border-color .2s;
}
.pub-search:focus{outline:none; border-color:var(--ink-2)}
.chips{display:flex; flex-wrap:wrap; gap:6px}
.chip{
  appearance:none; background:transparent; color:var(--ink-3);
  border:1px solid var(--line); border-radius:999px;
  padding:6px 12px; font:500 12px var(--mono); letter-spacing:.02em;
  cursor:pointer; transition:all .15s;
}
.chip:hover{border-color:var(--ink-3); color:var(--ink)}
.chip[aria-pressed="true"]{background:var(--ink); color:var(--bg); border-color:var(--ink)}
.chip .n{opacity:.55; margin-left:4px}
.chip[aria-pressed="true"] .n{opacity:.7}

.pub-count{font:11px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.08em; margin:6px 0 14px}
.pub-list{list-style:none; margin:0; padding:0}
.pub-item{
  display:grid; grid-template-columns:60px 1fr 170px; gap:24px;
  padding:18px 0; border-top:1px solid var(--line); align-items:baseline;
}
.pub-item:last-child{border-bottom:1px solid var(--line)}
@media (max-width:760px){.pub-item{grid-template-columns:52px 1fr} .pub-item .venue{grid-column:2; font-size:12px; color:var(--ink-4)}}
.pub-year{font:13px var(--mono); color:var(--ink-4)}
.pub-main .title{
  font-family:var(--serif); font-size:19px; line-height:1.3;
  color:var(--ink); margin:0 0 5px; font-weight:400; text-wrap:balance;
}
.pub-main .title a{text-decoration:none; border-bottom:1px solid transparent}
.pub-main .title a:hover{border-color:var(--ink-3)}
.pub-main .authors{font-size:13px; color:var(--ink-3); margin-bottom:5px; line-height:1.45}
.pub-main .authors b{color:var(--ink); font-weight:600}
.pub-main .meta{display:flex; flex-wrap:wrap; gap:6px 10px; font:10.5px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.06em}
.pub-main .meta .tag{padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--ink-3)}
.pub-main .meta .tag.journal{border-color:color-mix(in oklab,var(--accent) 35%,var(--line)); color:var(--accent)}
.pub-main .meta .tag.chapter{border-color:color-mix(in oklab,var(--accent-4) 45%,var(--line)); color:var(--accent-4)}
.pub-main .meta .q1{color:var(--accent-3); border-color:color-mix(in oklab,var(--accent-3) 40%,var(--line)); padding:2px 8px; border-radius:999px; border:1px solid}
.pub-main .meta .if{color:var(--ink-3)}
.pub-venue{font:12px var(--mono); color:var(--ink-3); text-align:right; line-height:1.4}
.pub-venue .doi{display:block; margin-top:2px; color:var(--ink-4); font-size:11px}
.pub-venue .doi a{color:var(--ink-3); text-decoration:underline; text-decoration-color:var(--line-2)}
.pub-venue .doi a:hover{color:var(--accent)}

.showmore{
  margin-top:20px; font:500 11.5px var(--mono); text-transform:uppercase; letter-spacing:.08em;
  background:none; border:none; color:var(--ink); cursor:pointer;
  padding:10px 0; border-bottom:1px solid var(--ink);
}
.showmore:hover{color:var(--accent); border-color:var(--accent)}

/* ============ PROJECTS ============ */
.proj-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:18px}
@media (max-width:720px){.proj-grid{grid-template-columns:1fr}}
.proj-card{
  background:var(--bg-elev); border:1px solid var(--line);
  border-radius:var(--radius); padding:22px 22px 18px;
  display:flex; flex-direction:column; gap:10px;
  transition:border-color .2s, transform .2s; position:relative; overflow:hidden;
}
.proj-card:hover{border-color:var(--ink-3)}
.proj-card .status{display:inline-flex; align-items:center; gap:6px; font:10.5px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.08em}
.proj-card .status i{width:6px; height:6px; border-radius:50%; background:var(--accent-3); box-shadow:0 0 0 3px color-mix(in oklab,var(--accent-3) 25%, transparent)}
.proj-card .status.closed i{background:var(--ink-4); box-shadow:none}
.proj-card h3{margin:2px 0 0; font-family:var(--serif); font-weight:400; font-size:21px; line-height:1.2; letter-spacing:-.005em; text-wrap:balance}
.proj-card .role-row{display:flex; gap:10px; flex-wrap:wrap; font:10.5px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.06em}
.proj-card .role-row .role{color:var(--accent)}
.proj-card .role-row .role.ip{color:var(--accent-2); font-weight:600}
.proj-card .foot{display:flex; justify-content:space-between; align-items:baseline; gap:10px; font:10.5px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.06em; margin-top:auto; padding-top:12px; border-top:1px dashed var(--line-2)}
.proj-card .foot .code{color:var(--ink-3)}
.proj-card .foot .amt{color:var(--ink)}

/* ============ NETWORK ============ */
.net-wrap{position:relative; background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--radius); padding:14px; overflow:hidden}
.net-wrap svg{width:100%; height:520px; display:block; cursor:grab}
.net-wrap .hint{position:absolute; bottom:10px; right:14px; font:10px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.08em}

/* ============ TOPICS ============ */
.topics{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; align-items:baseline}
.topic{
  display:inline-flex; align-items:baseline; gap:6px;
  padding:6px 13px; background:var(--chip); color:var(--chip-ink);
  border-radius:999px; font:500 13px var(--sans); cursor:default;
  transition:all .15s;
}
.topic:hover{background:var(--ink); color:var(--bg)}
.topic .w{font:10px var(--mono); color:var(--ink-4)}
.topic:hover .w{color:var(--bg)}
.topic.mid{font-size:15px; padding:7px 14px}
.topic.big{font-size:18px; padding:9px 16px; font-family:var(--serif); font-style:italic; font-weight:400; background:var(--ink); color:var(--bg)}
.topic.big .w{color:color-mix(in oklab,var(--bg) 55%,transparent)}

/* ============ LIST ROWS ============ */
.rows{display:flex; flex-direction:column}
.row-i{display:grid; grid-template-columns:110px 1fr auto; gap:24px; padding:14px 0; border-top:1px solid var(--line); align-items:baseline}
.row-i:last-child{border-bottom:1px solid var(--line)}
@media (max-width:700px){.row-i{grid-template-columns:90px 1fr; gap:14px} .row-i .meta{grid-column:2; white-space:normal}}
.row-i .when{font:12px var(--mono); color:var(--ink-4)}
.row-i .what{font-family:var(--serif); font-size:18px; line-height:1.3; color:var(--ink)}
.row-i .what small{display:block; font-family:var(--sans); font-size:13px; color:var(--ink-3); margin-top:3px; line-height:1.45}
.row-i .meta{font:10.5px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap}
.row-i .meta.accent{color:var(--accent)}

/* ============ CONTACT ============ */
.contact-grid{display:grid; grid-template-columns:1.3fr .7fr; gap:40px}
@media (max-width:720px){.contact-grid{grid-template-columns:1fr}}
.contact-cta{
  font-family:var(--serif); font-size:clamp(28px,3.6vw,40px); line-height:1.12;
  margin:0 0 20px; letter-spacing:-.005em; font-weight:400; text-wrap:balance;
}
.contact-cta em{color:var(--ink-3); font-style:italic}
.contact-cta a{color:var(--accent); text-decoration:none; border-bottom:2px solid var(--accent)}
.contact-cta a:hover{color:var(--accent-2); border-color:var(--accent-2)}
.socials{display:flex; flex-wrap:wrap; gap:8px}
.soc{
  display:inline-flex; align-items:center; gap:8px;
  padding:9px 14px; border:1px solid var(--line); border-radius:999px;
  color:var(--ink); text-decoration:none; font:500 13px var(--sans);
  transition:all .15s;
}
.soc:hover{border-color:var(--ink-2); transform:translateY(-1px)}
.soc i{width:8px; height:8px; border-radius:50%; background:var(--accent); display:inline-block}
.soc:nth-child(2) i{background:var(--accent-3)}
.soc:nth-child(3) i{background:var(--accent-2)}
.soc:nth-child(4) i{background:var(--accent-4)}

/* ============ FOOTER ============ */
.footer{
  margin-top:64px; display:flex; justify-content:space-between; align-items:baseline;
  font:11px var(--mono); color:var(--ink-4); text-transform:uppercase; letter-spacing:.08em;
  padding-top:18px; border-top:1px solid var(--line); flex-wrap:wrap; gap:8px;
}

/* tiny helpers */
.muted{color:var(--ink-3)}
.mono{font-family:var(--mono)}

/* Tweaks panel */
.tweaks{
  position:fixed; bottom:16px; right:16px; z-index:40;
  background:var(--bg-elev); border:1px solid var(--line); border-radius:12px;
  padding:14px 16px; box-shadow:0 20px 40px -20px rgba(0,0,0,.25);
  display:none; min-width:220px;
}
.tweaks.on{display:block}
.tweaks h4{margin:0 0 8px; font:600 11px var(--mono); text-transform:uppercase; letter-spacing:.08em; color:var(--ink-4)}
.tweaks .r{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:6px 0}
.tweaks .r span{font-size:13px; color:var(--ink-2)}

/* appear */
.appear{animation:ap .6s var(--ease) both}
@keyframes ap{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
</style>
</head>
<body>
<div class="page" id="app"></div>

<!-- Tweak panel (host-driven via postMessage) -->
<aside class="tweaks" id="tweaks-panel">
  <h4>Tweaks</h4>
  <div class="r"><span>Tema oscuro</span>
    <button class="ubtn" id="tw-dark" aria-pressed="false">OFF</button>
  </div>
  <div class="r"><span>Idioma</span>
    <button class="ubtn" id="tw-lang">ES</button>
  </div>
</aside>

const $ = (s, r=document) => r.querySelector(s);
const h = (tag, attrs={}, ...kids) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === "class") el.className = v;
    else if (k === "html") el.innerHTML = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v !== false && v != null) el.setAttribute(k, v);
  }
  for (const kid of kids.flat()) {
    if (kid == null || kid === false) continue;
    el.appendChild(typeof kid === "string" ? document.createTextNode(kid) : kid);
  }
  return el;
};

/* ---------- author formatting ---------- */
const ME_RE = /Paoletti/i;
function fmtAuthors(list, maxInline=null) {
  let shown = list;
  let trailing = "";
  if (maxInline && list.length > maxInline) {
    shown = list.slice(0, maxInline);
    trailing = ` <span class="muted">+ ${list.length - maxInline}</span>`;
  }
  return shown.map(a => ME_RE.test(a) ? `<b>${a}</b>` : a).join(", ") + trailing;
}

/* ---------- Chart: pubs per year ---------- */
function computeByYear() {
  const by = {};
  for (const p of window.__PUBS__) {
    if (!p.y) continue;
    by[p.y] = by[p.y] || { j:0, c:0 };
    if (p.type === "chapter") by[p.y].c++;
    else by[p.y].j++;
  }
  const years = Object.keys(by).map(Number).sort((a,b)=>a-b);
  return { years, by };
}

    )
  );
}

function renderChart() {
  const mount = $("#chart-mount");
  if (!mount) return;
  mount.innerHTML = "";
  const t = tr();
  const { years, by } = computeByYear();
  if (!years.length) return;
  const max = Math.max(...years.map(y => (by[y].j + by[y].c)));
  // SVG
  const W = 900, H = 300, padL = 40, padR = 16, padT = 20, padB = 38;
  const IW = W - padL - padR, IH = H - padT - padB;
  const n = years.length;
  const bw = IW / n * 0.62;
  const step = IW / n;

  const css = getComputedStyle(document.documentElement);
  const cAccent = css.getPropertyValue("--accent").trim() || "#2547ff";
  const cAccent4 = css.getPropertyValue("--accent-4").trim() || "#ffb020";
  const cInk4 = css.getPropertyValue("--ink-4").trim() || "#8f8f97";
  const cLine = css.getPropertyValue("--line").trim() || "#eae7dc";

  const legend = h("div", { class: "legend" },
    h("span", {}, h("i", { style: `background:${cAccent}` }), t.production_ui.journals),
    h("span", {}, h("i", { style: `background:${cAccent4}` }), t.production_ui.chapters)
  );

  // ticks
  const ticks = [0, Math.ceil(max*0.5), max];
  let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  // y gridlines
  ticks.forEach(v => {
    const y = padT + IH - (v/max)*IH;
    svg += `<line x1="${padL}" x2="${W-padR}" y1="${y}" y2="${y}" stroke="${cLine}" stroke-width="1"/>`;
    svg += `<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="${cInk4}" font-family="JetBrains Mono, monospace" font-size="10">${v}</text>`;
  });
  // bars
  years.forEach((y,i) => {
    const x = padL + i*step + (step-bw)/2;
    const j = by[y].j, c = by[y].c;
    const hJ = (j/max)*IH;
    const hC = (c/max)*IH;
    const yJ = padT + IH - hJ;
    const yC = yJ - hC;
    svg += `<rect x="${x}" y="${yJ}" width="${bw}" height="${hJ}" fill="${cAccent}" rx="2"/>`;
    if (c>0) svg += `<rect x="${x}" y="${yC}" width="${bw}" height="${hC}" fill="${cAccent4}" rx="2"/>`;
    svg += `<text x="${x+bw/2}" y="${padT+IH-hJ-hC-6}" text-anchor="middle" fill="${cInk4}" font-family="JetBrains Mono, monospace" font-size="10">${j+c}</text>`;
    svg += `<text x="${x+bw/2}" y="${H-14}" text-anchor="middle" fill="${cInk4}" font-family="JetBrains Mono, monospace" font-size="11">${y}</text>`;
  });
  svg += `</svg>`;
  const svgWrap = h("div", { html: svg });
  mount.appendChild(legend);
  mount.appendChild(svgWrap);
}

/* ---------- Publications ---------- */
function applyPubFilter() {
  const q = STATE.pubQuery.toLowerCase().trim();
  let list = window.__PUBS__.slice();
  if (STATE.pubFilter !== "all") list = list.filter(p => p.type === STATE.pubFilter);
  if (q) {
    list = list.filter(p =>
      (p.t||"").toLowerCase().includes(q) ||
      (p.v||"").toLowerCase().includes(q) ||
      (p.a||[]).some(a => a.toLowerCase().includes(q))
    );
  }
  list.sort((a,b) => (b.y||0) - (a.y||0));
  return list;
}

function renderPubs() {
  const t = tr();
  const counts = { all: window.__PUBS__.length,
                   journal: window.__PUBS__.filter(p=>p.type==="journal").length,
                   chapter: window.__PUBS__.filter(p=>p.type==="chapter").length };
  const filtered = applyPubFilter();
  const shown = filtered.slice(0, STATE.pubLimit);
  const canExpand = filtered.length > STATE.pubLimit;
  const canCollapse = STATE.pubLimit > 12 && filtered.length > 12;

  const toolbar = h("div", { class: "pub-toolbar" },
    h("input", {
      class: "pub-search", type: "search",

        }, t.pubs_ui[k], h("span", { class: "n" }, String(counts[k])))
      )
    )
  );
  const count = h("div", { class: "pub-count" }, `${t.pubs_ui.showing} ${shown.length} ${t.pubs_ui.of} ${filtered.length}`);
  const list = h("ol", { class: "pub-list" },
    shown.map(p => h("li", { class: "pub-item" },
      h("div", { class: "pub-year" }, String(p.y||"")),
      h("div", { class: "pub-main" },
        h("h3", { class: "title" },
          p.doi
            ? h("a", { href: `https://doi.org/${p.doi}`, target:"_blank", rel:"noopener" }, p.t)
            : p.t
        ),
        h("div", { class: "authors", html: fmtAuthors(p.a, 8) }),
        h("div", { class: "meta" },

        )
      ),

      )
    ))
  );

  const btn = canExpand
    ? h("button", { class: "showmore", onclick: () => { STATE.pubLimit += 15; rerenderPubs(); } }, t.pubs_ui.showmore)
    : canCollapse
      ? h("button", { class: "showmore", onclick: () => { STATE.pubLimit = 12; rerenderPubs(); } }, t.pubs_ui.showless)
      : null;

  return h("section", { class: "block", id: "pubs" },

      sectionSide("pubs"),
      h("div", { id: "pubs-mount" },
        toolbar, count, list, btn
      )
    )
  );

  const mount = $("#pubs-mount");

function renderProjects() {
  const t = tr();
  const list = window.__PROJS__.slice().sort((a,b) => {
    const as = parseInt((a.end||a.start||"0").slice(-4));
    const bs = parseInt((b.end||b.start||"0").slice(-4));
    return bs - as;
  });
  const today = new Date();
  return h("section", { class: "block", id: "proj" },
    sectionHead("04", "proj"),
    h("div", { class: "sec-body" },
      sectionSide("proj"),
      h("div", { class: "proj-grid" },
        list.map(p => {
          const endY = parseInt((p.end||"").slice(6,10));
          const active = endY >= today.getFullYear();
          const status = active ? t.proj_active : t.proj_closed;
          const sy = (p.start||"").slice(6,10), ey = (p.end||"").slice(6,10);
          const rawName = p.name || "";
          // Strip trailing "(CODE)" for display
          const cleanName = rawName.replace(/\s*\([A-Z0-9\-\.]+\)\s*$/, "").trim();
          return h("div", { class: "proj-card" },
            h("div", { class: `status ${active?"":"closed"}` }, h("i"), status, " · ", sy, " – ", ey),

/* ---------- Co-authorship map ---------- */
function buildCoauthorGraph() {
  const pubs = window.__PUBS__;
  const count = {};   // author -> count
  const pairs = {};   // "a|b" -> count (with me)
  for (const p of pubs) {
    const mePresent = p.a.some(a => ME_RE.test(a));
    if (!mePresent) continue;
    for (const a of p.a) {
      if (ME_RE.test(a)) continue;
      count[a] = (count[a]||0) + 1;
    }
  }
  const top = Object.entries(count)
    .sort((a,b)=>b[1]-a[1])
    .slice(0, 15);
  return top;
}

function renderCoauthors() {
  const mount = $("#net-mount");
  if (!mount) return;
  mount.innerHTML = "";
  const top = buildCoauthorGraph();
  const W = 900, H = 520;
  const css = getComputedStyle(document.documentElement);
  const cAccent = css.getPropertyValue("--accent").trim() || "#2547ff";
  const cAccent2 = css.getPropertyValue("--accent-2").trim() || "#ff5a2e";
  const cInk = css.getPropertyValue("--ink").trim() || "#121214";
  const cBg = css.getPropertyValue("--bg-elev").trim() || "#fff";
  const cLine = css.getPropertyValue("--line").trim() || "#eae7dc";
  const cInk3 = css.getPropertyValue("--ink-3").trim() || "#5e5e65";
  const cInk4 = css.getPropertyValue("--ink-4").trim() || "#8f8f97";

  // positions: me at center, nodes on concentric rings by tier
  const cx = W/2, cy = H/2;
  const nodes = [{ id: "__me", name: "Mercedes E. Paoletti", x: cx, y: cy, w: 87, fixed: true }];
  const tiers = [
    { r: 150, start: 0, items: [] },
    { r: 240, start: Math.PI/6, items: [] },
  ];
  // distribute: top 5 on inner, rest on outer
  top.forEach((t, i) => {
    if (i < 5) tiers[0].items.push(t);
    else tiers[1].items.push(t);
  });
  tiers.forEach(tier => {
    const n = tier.items.length;
    tier.items.forEach(([name, w], i) => {
      const ang = tier.start + (i / n) * Math.PI * 2;
      const x = cx + Math.cos(ang) * tier.r;
      const y = cy + Math.sin(ang) * tier.r;
      nodes.push({ id: "n"+nodes.length, name, x, y, w });
    });
  });

  const maxW = Math.max(...nodes.map(n => n.w));
  const nodeR = (w, me=false) => {
    if (me) return 34;
    return 9 + (w/maxW) * 20;
  };

  const edges = nodes.slice(1).map(n => ({ a: nodes[0], b: n, w: n.w }));

  // Build SVG
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
  svg.style.background = cBg;

  // edges layer
  const gEdges = document.createElementNS("http://www.w3.org/2000/svg", "g");
  svg.appendChild(gEdges);
  // nodes layer
  const gNodes = document.createElementNS("http://www.w3.org/2000/svg", "g");
  svg.appendChild(gNodes);

  function draw() {
    gEdges.innerHTML = "";
    gNodes.innerHTML = "";
    edges.forEach(e => {
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", e.a.x); line.setAttribute("y1", e.a.y);
      line.setAttribute("x2", e.b.x); line.setAttribute("y2", e.b.y);
      const sw = 0.6 + (e.w/maxW) * 3.2;
      line.setAttribute("stroke", cLine);
      line.setAttribute("stroke-width", sw.toFixed(2));
      line.setAttribute("opacity", "0.85");
      gEdges.appendChild(line);
    });
    nodes.forEach((n, i) => {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("data-idx", i);
      g.style.cursor = n.fixed ? "default" : "grab";
      const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      const r = nodeR(n.w, !!n.fixed);
      circle.setAttribute("cx", n.x);
      circle.setAttribute("cy", n.y);
      circle.setAttribute("r", r);
      circle.setAttribute("fill", n.fixed ? cInk : cAccent);
      circle.setAttribute("stroke", cBg);
      circle.setAttribute("stroke-width", "3");
      g.appendChild(circle);

      if (n.fixed) {
        // label inside
        const tx = document.createElementNS("http://www.w3.org/2000/svg", "text");
        tx.setAttribute("x", n.x); tx.setAttribute("y", n.y + 4);
        tx.setAttribute("text-anchor", "middle");
        tx.setAttribute("fill", cBg);
        tx.setAttribute("font-family", "JetBrains Mono, monospace");
        tx.setAttribute("font-size", "11");
        tx.setAttribute("font-weight", "600");
        tx.textContent = "MP";
        g.appendChild(tx);
      }

      // Author label
      const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
      const isRight = n.x >= cx;
      label.setAttribute("x", n.x + (isRight ? r + 8 : -r - 8));
      label.setAttribute("y", n.y + 4);
      label.setAttribute("text-anchor", isRight ? "start" : "end");
      label.setAttribute("fill", cInk);
      label.setAttribute("font-family", "Space Grotesk, sans-serif");
      label.setAttribute("font-size", n.fixed ? "13" : "12");
      label.setAttribute("font-weight", n.fixed ? "600" : "500");
      label.textContent = n.fixed ? "" : n.name;
      g.appendChild(label);

      // Count badge
      if (!n.fixed) {
        const badge = document.createElementNS("http://www.w3.org/2000/svg", "text");
        badge.setAttribute("x", n.x + (isRight ? r + 8 : -r - 8));
        badge.setAttribute("y", n.y + 18);
        badge.setAttribute("text-anchor", isRight ? "start" : "end");
        badge.setAttribute("fill", cInk4);
        badge.setAttribute("font-family", "JetBrains Mono, monospace");
        badge.setAttribute("font-size", "10");
        badge.textContent = `${n.w} papers`;
        g.appendChild(badge);
      }

      // drag
      if (!n.fixed) {
        g.addEventListener("pointerdown", (ev) => {
          ev.preventDefault();
          const pt = svg.createSVGPoint();
          const startX = ev.clientX, startY = ev.clientY;
          const origX = n.x, origY = n.y;
          const rect = svg.getBoundingClientRect();
          const scaleX = W / rect.width;
          g.style.cursor = "grabbing";
          function move(e2) {
            const dx = (e2.clientX - startX) * scaleX;
            const dy = (e2.clientY - startY) * scaleX;
            n.x = origX + dx; n.y = origY + dy;
            draw();
          }
          function up() {
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
            g.style.cursor = "grab";
          }
          window.addEventListener("pointermove", move);
          window.addEventListener("pointerup", up);
        });
      }

      gNodes.appendChild(g);
    });
  }
  draw();
  mount.appendChild(svg);
}

});

}, 120);
